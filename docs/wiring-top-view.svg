    text {
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      fill: #1f2937;
    }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 19px; fill: #475569; }
    .section { font-size: 24px; font-weight: 700; }
    .label { font-size: 20px; font-weight: 600; }
    .pintext { font-size: 17px; fill: #64748b; }
    .pintext-used-gpio { font-size: 18px; font-weight: 700; fill: #15803d; }
    .pintext-used-power { font-size: 18px; font-weight: 700; fill: #b91c1c; }
    .pintext-used-gnd { font-size: 18px; font-weight: 700; fill: #111827; }
    .small { font-size: 16px; fill: #475569; }
    .tiny { font-size: 15px; fill: #64748b; }
    .board { fill: #3b3b3b; stroke: #111827; stroke-width: 3; }
    .module { fill: #c9c9c9; stroke: #666; stroke-width: 2; }
    .sensor-a { fill: #e6f6ff; stroke: #176087; stroke-width: 3; }
    .sensor-b { fill: #eef8ea; stroke: #2d6a32; stroke-width: 3; }
    .pin { fill: #facc15; stroke: #854d0e; stroke-width: 2; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
    .note { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
  </style>

