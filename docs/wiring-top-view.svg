<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">air-quality-monitor 默认接线图</title>
  <desc id="desc">按 YD-ESP32-S3 引脚图方向绘制。SCD41 接 GPIO8 和 GPIO9，SGP41 接 GPIO11 和 GPIO12，SPS30 走 UART 接 GPIO17 和 GPIO18，板载 RGB 使用 GPIO48。</desc>
  <style>
    text {
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      fill: #1f2937;
    }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 18px; fill: #475569; }
    .section { font-size: 24px; font-weight: 700; }
    .label { font-size: 19px; font-weight: 600; }
    .small { font-size: 16px; fill: #475569; }
    .tiny { font-size: 14px; fill: #64748b; }
    .board { fill: #343434; stroke: #111827; stroke-width: 3; }
    .module { fill: #bdbdbd; stroke: #666; stroke-width: 2; }
    .sensor-scd { fill: #eef8ff; stroke: #176087; stroke-width: 3; }
    .sensor-sgp { fill: #eef8ea; stroke: #2d6a32; stroke-width: 3; }
    .sensor-sps { fill: #fff4e8; stroke: #b45309; stroke-width: 3; }
    .pin { fill: #facc15; stroke: #854d0e; stroke-width: 2; }
    .pin-line { stroke: #9ca3af; stroke-width: 2; }
    .pin-power { font-size: 18px; font-weight: 700; fill: #b91c1c; }
    .pin-gpio { font-size: 18px; font-weight: 700; fill: #15803d; }
    .pin-gnd { font-size: 18px; font-weight: 700; fill: #111827; }
    .wire { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
    .note { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
    .ghost { fill: #cbd5e1; opacity: 0.45; }
  </style>

  <rect x="0" y="0" width="1600" height="980" fill="#fffdf8"/>

  <text x="800" y="56" text-anchor="middle" class="title">air-quality-monitor 默认接线图</text>
  <text x="800" y="88" text-anchor="middle" class="subtitle">方向按你提供的 YD-ESP32-S3 引脚图绘制：天线在上，USB 在下，只高亮当前项目实际用到的孔位</text>

