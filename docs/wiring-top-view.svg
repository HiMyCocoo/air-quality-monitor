<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">按 YD-ESP32-S3 引脚图绘制的 SCD41 与 SPS30 杜邦线接线图</title>
  <desc id="desc">开发板按 USB 朝下的引脚图方向绘制，SCD41 接 3V3、GPIO8、GPIO9 与 GND；SPS30 接 5V0、GPIO17、GPIO18、GND 与 SEL 到 GND。</desc>
