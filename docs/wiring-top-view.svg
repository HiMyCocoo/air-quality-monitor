  <rect x="1080" y="120" width="430" height="195" rx="18" class="note"/>
  <text x="1110" y="160" class="section">这张图里实际用了哪些孔位</text>
  <text x="1110" y="198" class="small">SCD41：左侧 `3V3`、`GPIO8`、`GPIO9`</text>
  <text x="1110" y="224" class="small">SCD41 GND：右上 `GND`</text>
  <text x="1110" y="250" class="small">SPS30：左侧 `GPIO17`、`GPIO18`、`5V0`</text>
  <text x="1110" y="276" class="small">SPS30 的 `GND` 和 `SEL`：右下两个 `GND`</text>
  <text x="1110" y="300" class="tiny">`SEL` 不是接 GPIO，而是直接拉到 `GND` 选择 I2C 模式</text>

  <rect x="1080" y="335" width="430" height="170" rx="18" class="note"/>
  <text x="1110" y="375" class="section">线色建议</text>
  <text x="1110" y="411" class="small">黑 = GND，红 = 3V3，橙 = 5V0</text>
  <text x="1110" y="437" class="small">黄 / 蓝 = SCD41 SDA / SCL</text>
  <text x="1110" y="463" class="small">绿 / 浅灰 = SPS30 SDA / SCL，灰 = SEL→GND</text>
  <text x="1110" y="487" class="tiny">颜色只是建议，真正关键是别把 `SDA/SCL` 上拉到 `5V`</text>

  <rect x="1080" y="530" width="430" height="170" rx="18" class="note"/>
  <text x="1110" y="570" class="section">为什么按这张引脚图画会更好接</text>
  <text x="1110" y="608" class="small">1. 可以直接对着板子丝印找 `GPIO17 / GPIO18 / GPIO8 / GPIO9`</text>
  <text x="1110" y="636" class="small">2. `5V0` 和底部 `GND` 位置也一起标出来了</text>
  <text x="1110" y="664" class="small">3. 这张图与 README 默认配置完全一致，不需要改固件 GPIO</text>

  <rect x="1080" y="725" width="430" height="120" rx="18" class="note"/>
  <text x="1110" y="765" class="section">补充</text>
  <text x="1110" y="797" class="small">所有 `GND` 在板内互通。</text>
  <text x="1110" y="823" class="small">如果你实际插线更顺，换另一个 `GND` 孔也可以。</text>
</svg>
