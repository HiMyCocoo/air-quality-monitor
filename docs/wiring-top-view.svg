  <text x="270" y="202" text-anchor="middle" class="small">模块自上而下：SDA / SCL / VDD / GND</text>
  <text x="270" y="224" text-anchor="middle" class="small">对应 GPIO8 / GPIO9 / 3V3 / GND</text>
