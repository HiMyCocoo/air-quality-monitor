  <text x="270" y="622" text-anchor="middle" class="small">原厂 5Pin：Pin1 -&gt; Pin5 = VDD / SDA / SCL / SEL / GND</text>
  <text x="270" y="644" text-anchor="middle" class="small">对应 5V0 / GPIO17 / GPIO18 / GND / GND</text>
