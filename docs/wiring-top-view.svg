  <text x="800" y="54" text-anchor="middle" class="title">按 YD-ESP32-S3 引脚图位置绘制的杜邦线接线图</text>
  <text x="800" y="84" text-anchor="middle" class="subtitle">方向按你发来的图：天线在上，USB 在下；连接仍然与当前默认 GPIO 完全一致</text>

