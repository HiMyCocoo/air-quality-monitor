  <rect x="70" y="140" width="420" height="200" rx="22" class="sensor-scd"/>
  <text x="280" y="182" text-anchor="middle" class="section">SCD41</text>
  <text x="280" y="214" text-anchor="middle" class="small">针脚自上而下：SDA / SCL / VDD / GND</text>
  <rect x="124" y="242" width="214" height="58" rx="14" fill="#ffffff" stroke="#176087" stroke-width="2"/>
  <text x="231" y="278" text-anchor="middle" class="label">CO2 / 温湿度</text>
  <circle cx="458" cy="218" r="8" fill="#fff" stroke="#176087" stroke-width="2"/>
  <circle cx="458" cy="250" r="8" fill="#fff" stroke="#176087" stroke-width="2"/>
  <circle cx="458" cy="282" r="8" fill="#fff" stroke="#176087" stroke-width="2"/>
  <circle cx="458" cy="314" r="8" fill="#fff" stroke="#176087" stroke-width="2"/>
  <text x="432" y="224" text-anchor="end" class="label">SDA</text>
  <text x="432" y="256" text-anchor="end" class="label">SCL</text>
  <text x="432" y="288" text-anchor="end" class="label">VDD</text>
  <text x="432" y="320" text-anchor="end" class="label">GND</text>

  <path d="M 466 218 C 556 218, 568 470, 642 490" class="wire" stroke="#eab308"/>
  <path d="M 466 250 C 564 250, 576 560, 642 580" class="wire" stroke="#2563eb"/>
  <path d="M 466 282 C 556 282, 570 198, 642 180" class="wire" stroke="#dc2626"/>
  <path d="M 466 314 L 588 314 L 588 126 L 1010 126 L 1010 180 L 958 180" class="wire" stroke="#111827"/>

  <rect x="70" y="390" width="420" height="200" rx="22" class="sensor-sgp"/>
  <text x="280" y="432" text-anchor="middle" class="section">SGP41</text>
  <text x="280" y="464" text-anchor="middle" class="small">常用 4Pin：SDA / SCL / VDD / GND</text>
  <rect x="124" y="492" width="214" height="58" rx="14" fill="#ffffff" stroke="#2d6a32" stroke-width="2"/>
  <text x="231" y="528" text-anchor="middle" class="label">VOC / NOx</text>
  <circle cx="458" cy="458" r="8" fill="#fff" stroke="#2d6a32" stroke-width="2"/>
  <circle cx="458" cy="490" r="8" fill="#fff" stroke="#2d6a32" stroke-width="2"/>
  <circle cx="458" cy="522" r="8" fill="#fff" stroke="#2d6a32" stroke-width="2"/>
  <circle cx="458" cy="554" r="8" fill="#fff" stroke="#2d6a32" stroke-width="2"/>
  <text x="432" y="464" text-anchor="end" class="label">SDA</text>
  <text x="432" y="496" text-anchor="end" class="label">SCL</text>
  <text x="432" y="528" text-anchor="end" class="label">VDD</text>
  <text x="432" y="560" text-anchor="end" class="label">GND</text>

  <path d="M 466 458 C 556 458, 570 620, 642 640" class="wire" stroke="#eab308"/>
  <path d="M 466 490 C 556 490, 570 650, 642 670" class="wire" stroke="#2563eb"/>
  <path d="M 466 522 C 546 522, 568 244, 642 210" class="wire" stroke="#dc2626"/>
  <path d="M 466 554 C 558 554, 574 770, 642 790" class="wire" stroke="#111827"/>

  <rect x="70" y="630" width="500" height="250" rx="22" class="sensor-sps"/>
  <text x="320" y="674" text-anchor="middle" class="section">SPS30</text>
  <text x="320" y="706" text-anchor="middle" class="small">原厂 5Pin：VDD / RX / TX / SEL / GND</text>
  <rect x="152" y="742" width="240" height="60" rx="14" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
  <text x="272" y="780" text-anchor="middle" class="label">颗粒物模块</text>
  <circle cx="488" cy="700" r="8" fill="#fff" stroke="#b45309" stroke-width="2"/>
  <circle cx="488" cy="735" r="8" fill="#fff" stroke="#b45309" stroke-width="2"/>
  <circle cx="488" cy="770" r="8" fill="#fff" stroke="#b45309" stroke-width="2"/>
  <circle cx="488" cy="805" r="8" fill="#fff" stroke="#b45309" stroke-width="2"/>
  <circle cx="488" cy="840" r="8" fill="#fff" stroke="#b45309" stroke-width="2"/>
  <text x="462" y="706" text-anchor="end" class="label">VDD</text>
  <text x="462" y="741" text-anchor="end" class="label">RX</text>
  <text x="462" y="776" text-anchor="end" class="label">TX</text>
  <text x="462" y="811" text-anchor="end" class="label">SEL</text>
  <text x="462" y="846" text-anchor="end" class="label">GND</text>

  <path d="M 496 700 C 580 700, 592 744, 642 760" class="wire" stroke="#f97316"/>
  <path d="M 496 735 C 576 735, 582 452, 642 430" class="wire" stroke="#16a34a"/>
  <path d="M 496 770 C 578 770, 586 484, 642 460" class="wire" stroke="#7c3aed"/>
  <path d="M 496 805 L 576 805" class="wire" stroke="#94a3b8" stroke-dasharray="10 10"/>
  <text x="592" y="810" class="small">悬空，不接</text>
  <path d="M 496 840 C 664 840, 790 818, 958 790" class="wire" stroke="#111827"/>

  <rect x="1040" y="140" width="500" height="310" rx="20" class="note"/>
  <text x="1070" y="182" class="section">接线要点</text>
  <text x="1070" y="220" class="small">1. SCD41 用 I2C0：GPIO8 / GPIO9</text>
  <text x="1070" y="252" class="small">2. SGP41 用 I2C1：GPIO11 / GPIO12</text>
  <text x="1070" y="284" class="small">3. SPS30 走 UART1：GPIO17 / GPIO18</text>
  <text x="1070" y="316" class="small">4. GPIO17 是开发板发出，接传感器 RX</text>
  <text x="1070" y="348" class="small">5. GPIO18 是开发板接收，接传感器 TX</text>
  <text x="1070" y="380" class="small">6. SPS30 SEL 保持悬空，不要再拉到 GND</text>
  <text x="1070" y="412" class="small">7. 板载 RGB 是开发板自带 WS2812(GPIO48)，不需要外接</text>

  <rect x="1040" y="480" width="500" height="220" rx="20" class="note"/>
  <text x="1070" y="522" class="section">线色建议</text>
  <line x1="1074" y1="558" x2="1132" y2="558" class="wire" stroke="#eab308"/>
  <text x="1150" y="564" class="small">黄色：I2C SDA</text>
  <line x1="1074" y1="592" x2="1132" y2="592" class="wire" stroke="#2563eb"/>
  <text x="1150" y="598" class="small">蓝色：I2C SCL</text>
  <line x1="1074" y1="626" x2="1132" y2="626" class="wire" stroke="#dc2626"/>
  <text x="1150" y="632" class="small">红色：3.3V</text>
  <line x1="1074" y1="660" x2="1132" y2="660" class="wire" stroke="#f97316"/>
  <text x="1150" y="666" class="small">橙色：5V</text>
  <line x1="1290" y1="558" x2="1348" y2="558" class="wire" stroke="#16a34a"/>
  <text x="1366" y="564" class="small">绿色：ESP TX -&gt; SPS30 RX</text>
  <line x1="1290" y1="592" x2="1348" y2="592" class="wire" stroke="#7c3aed"/>
  <text x="1366" y="598" class="small">紫色：SPS30 TX -&gt; ESP RX</text>
  <line x1="1290" y1="626" x2="1348" y2="626" class="wire" stroke="#111827"/>
  <text x="1366" y="632" class="small">黑色：GND</text>
  <line x1="1290" y1="660" x2="1348" y2="660" class="wire" stroke="#94a3b8" stroke-dasharray="10 10"/>
  <text x="1366" y="666" class="small">灰色虚线：悬空 / 不接</text>

  <rect x="1040" y="730" width="500" height="130" rx="20" class="note"/>
  <text x="1070" y="772" class="section">补充</text>
  <text x="1070" y="806" class="small">开发板上所有 GND 在板内互通，图里只是选了更顺手的位置。</text>
  <text x="1070" y="834" class="small">如果你改了 GPIO，请同步更新 menuconfig 和 README 里的接线说明。</text>
</svg>
