  <line x1="958" y1="790" x2="1016" y2="790" class="pin-line"/>

  <text x="574" y="186" text-anchor="end" class="pin-power">3V3</text>
  <text x="574" y="216" text-anchor="end" class="pin-power">3V3</text>
  <text x="574" y="436" text-anchor="end" class="pin-gpio">GPIO17</text>
  <text x="574" y="466" text-anchor="end" class="pin-gpio">GPIO18</text>
  <text x="574" y="496" text-anchor="end" class="pin-gpio">GPIO8</text>
  <text x="574" y="586" text-anchor="end" class="pin-gpio">GPIO9</text>
  <text x="574" y="646" text-anchor="end" class="pin-gpio">GPIO11</text>
  <text x="574" y="676" text-anchor="end" class="pin-gpio">GPIO12</text>
  <text x="574" y="766" text-anchor="end" class="pin-power">5V0</text>
  <text x="574" y="796" text-anchor="end" class="pin-gnd">GND</text>

  <text x="1026" y="186" class="pin-gnd">GND</text>
  <text x="1026" y="766" class="pin-gnd">GND</text>
