  <rect x="772" y="560" width="56" height="28" rx="6" fill="#f8fafc" stroke="#9ca3af" stroke-width="2"/>
  <text x="800" y="579" text-anchor="middle" class="small">BOOT</text>
  <rect x="726" y="720" width="80" height="74" rx="8" fill="#c9c2ee"/>
  <rect x="814" y="720" width="80" height="74" rx="8" fill="#c9c2ee"/>
  <text x="766" y="706" text-anchor="middle" class="small">USB</text>
  <text x="854" y="706" text-anchor="middle" class="small">UART</text>

  <rect x="838" y="660" width="56" height="28" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
