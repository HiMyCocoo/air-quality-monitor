name: Build And Release Firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Read version metadata
        id: meta
        run: |
          version="$(bash scripts/get-project-version.sh)"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="v${version}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Validate tag matches PROJECT_VER
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected="v${{ steps.meta.outputs.version }}"
          actual="${{ steps.meta.outputs.tag }}"
          if [[ "${expected}" != "${actual}" ]]; then
            echo "Tag ${actual} does not match PROJECT_VER ${expected}" >&2
            exit 1
          fi

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0
          target: esp32s3
          path: '.'

      - name: Build merged firmware image
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0
          target: esp32s3
          path: '.'
          command: >
            esptool.py --chip esp32s3 merge_bin
            -o build/air_quality_monitor-merged.bin
            @build/flash_args

      - name: Package release assets
        run: |
          mkdir -p dist
          version="${{ steps.meta.outputs.version }}"

          cp build/air_quality_monitor.bin "dist/air_quality_monitor-${version}.bin"
          cp build/air_quality_monitor-merged.bin "dist/air_quality_monitor-${version}-merged.bin"
          cp build/bootloader/bootloader.bin "dist/bootloader-${version}.bin"
          cp build/partition_table/partition-table.bin "dist/partition-table-${version}.bin"
          cp build/ota_data_initial.bin "dist/ota_data_initial-${version}.bin"
          cp build/flasher_args.json "dist/flasher_args-${version}.json"

          (
            cd dist
            shasum -a 256 ./* > SHA256SUMS.txt
          )

      - name: Create extra release notes
        id: notes
        run: |
          cat > release-notes.md <<'EOF'
          ## Firmware Assets

          - `air_quality_monitor-<version>.bin`: 应用固件
          - `air_quality_monitor-<version>-merged.bin`: 合并后的整包镜像，适合完整刷机
          - `bootloader-<version>.bin`: Bootloader
          - `partition-table-<version>.bin`: 分区表
          - `ota_data_initial-<version>.bin`: OTA 数据初始化镜像
          - `flasher_args-<version>.json`: ESP-IDF 烧录参数
          - `SHA256SUMS.txt`: 所有发布文件的校验值
          EOF
          sed -i.bak "s/<version>/${{ steps.meta.outputs.version }}/g" release-notes.md
          rm release-notes.md.bak

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          previous_tag="$(git tag --sort=-v:refname | grep '^v' | grep -vx "${{ steps.meta.outputs.tag }}" | head -n1 || true)"
          notes_args=()
          if [[ -n "${previous_tag}" ]]; then
            notes_args+=(--notes-start-tag "${previous_tag}")
          fi

          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.meta.outputs.tag }}" dist/* --clobber
          else
            gh release create "${{ steps.meta.outputs.tag }}" \
              dist/* \
              --verify-tag \
              --generate-notes \
              --notes "$(cat release-notes.md)" \
              --title "${{ steps.meta.outputs.tag }}" \
              "${notes_args[@]}"
          fi
