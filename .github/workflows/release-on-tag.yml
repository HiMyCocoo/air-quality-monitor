name: Build And Release Firmware

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and publish, for example v0.1.0
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.meta.outputs.publish }}
      create_tag: ${{ steps.meta.outputs.create_tag }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine release target
        id: meta
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          git fetch --tags origin
          current_commit_tag="$(git tag --points-at HEAD --list 'v*' --sort=-v:refname | head -n1 || true)"

          if [[ -n "${INPUT_TAG:-}" ]]; then
            if ! git rev-parse "refs/tags/${INPUT_TAG}" >/dev/null 2>&1; then
              echo "Tag ${INPUT_TAG} does not exist." >&2
              exit 1
            fi

            git checkout "${INPUT_TAG}"
            version="${INPUT_TAG#v}"
            tag="${INPUT_TAG}"
            publish="true"
            create_tag="false"
          elif [[ -n "${current_commit_tag}" ]]; then
            version="${current_commit_tag#v}"
            tag="${current_commit_tag}"
            publish="true"
            create_tag="false"
          else
            version="$(bash scripts/get-next-release-version.sh)"
            tag="v${version}"
            create_tag="true"
            publish="true"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"
          echo "create_tag=${create_tag}" >> "${GITHUB_OUTPUT}"

      - name: Create and push annotated tag
        if: steps.meta.outputs.create_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.meta.outputs.tag }}" -m "Release ${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Summary
        run: |
          if [[ "${{ steps.meta.outputs.publish }}" != "true" ]]; then
            echo "Tag ${{ steps.meta.outputs.tag }} already exists, skip release."
          elif [[ "${{ steps.meta.outputs.create_tag }}" == "true" ]]; then
            echo "Created tag ${{ steps.meta.outputs.tag }} and will publish release."
          else
            echo "Will publish release for existing tag ${{ steps.meta.outputs.tag }}."
          fi

  release:
    needs: prepare
    if: needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out release ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag }}
          submodules: recursive

      - name: Read version from tagged source
        id: meta
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          bash scripts/set-project-version.sh "${version}"
          expected="v${version}"
          actual="${{ needs.prepare.outputs.tag }}"
          if [[ "${expected}" != "${actual}" ]]; then
            echo "Tag ${actual} does not match PROJECT_VER ${expected}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0
          target: esp32s3
          path: '.'

      - name: Build merged firmware image
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0
          target: esp32s3
          path: '.'
          command: >
            cd build &&
            esptool --chip esp32s3 merge-bin
            -o air_quality_monitor-merged.bin
            @flash_args

      - name: Package release assets
        run: |
          set -euo pipefail

          mkdir -p dist
          version="${{ steps.meta.outputs.version }}"

          cp build/air_quality_monitor.bin "dist/air_quality_monitor-ota-${version}.bin"
          cp build/air_quality_monitor-merged.bin "dist/air_quality_monitor-full-${version}.bin"
          cp build/bootloader/bootloader.bin "dist/bootloader-${version}.bin"
          cp build/partition_table/partition-table.bin "dist/partition-table-${version}.bin"
          cp build/ota_data_initial.bin "dist/ota_data_initial-${version}.bin"
          cp build/flasher_args.json "dist/flasher_args-${version}.json"

          (
            cd dist
            shasum -a 256 ./* > SHA256SUMS.txt
          )

      - name: Create extra release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## Firmware Assets

          - `air_quality_monitor-ota-<version>.bin`: OTA 升级用的应用固件
          - `air_quality_monitor-full-<version>.bin`: 串口完整刷机用的整包镜像
          - `bootloader-<version>.bin`: Bootloader
          - `partition-table-<version>.bin`: 分区表
          - `ota_data_initial-<version>.bin`: OTA 数据初始化镜像
          - `flasher_args-<version>.json`: ESP-IDF 烧录参数
          - `SHA256SUMS.txt`: 所有发布文件的校验值
          EOF
          sed -i.bak "s/<version>/${{ steps.meta.outputs.version }}/g" release-notes.md
          rm release-notes.md.bak

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag="${{ needs.prepare.outputs.tag }}"
          previous_tag="$(git tag --sort=-v:refname | grep '^v' | grep -vx "${tag}" | head -n1 || true)"
          notes_args=()
          if [[ -n "${previous_tag}" ]]; then
            notes_args+=(--notes-start-tag "${previous_tag}")
          fi

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber
          else
            gh release create "${tag}" \
              dist/* \
              --verify-tag \
              --generate-notes \
              --notes "$(cat release-notes.md)" \
              --title "${tag}" \
              "${notes_args[@]}"
          fi
